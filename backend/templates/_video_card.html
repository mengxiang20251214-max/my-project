<!-- 视频卡片（简洁版） -->
<article class="video-card group rounded-2xl overflow-hidden border transition-all duration-300 hover:-translate-y-1 hover:shadow-xl"
  style="background:var(--color-card); border-color:var(--color-border);">
  <a href="/video/{{ v.id }}" class="block relative overflow-hidden" style="aspect-ratio:16/9; background:var(--color-input);">
    <img src="{{ v.cover_url or 'https://picsum.photos/seed/'~v.id~'/640/360' }}"
         loading="lazy" alt="{{ v.title }}"
         class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
         style="background:rgba(0,0,0,0.35);">
      <div class="w-12 h-12 rounded-full bg-white/90 flex items-center justify-center shadow-lg">
        <svg class="w-5 h-5 ml-0.5" style="color:#6366f1;" fill="currentColor" viewBox="0 0 20 20">
          <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
        </svg>
      </div>
    </div>
    {% if v.category %}
    <span class="absolute top-2 left-2 px-2 py-0.5 rounded-full text-white text-xs font-medium"
          style="background:rgba(99,102,241,0.85); backdrop-filter:blur(4px);">{{ v.category.name }}</span>
    {% endif %}
  </a>
  <div class="p-3">
    <a href="/video/{{ v.id }}" class="block">
      <h3 class="text-sm font-semibold leading-snug line-clamp-2 transition-colors hover:text-primary-500"
          style="color:var(--color-text);">{{ v.title }}</h3>
    </a>
    <div class="mt-2 flex items-center justify-between text-xs" style="color:var(--color-muted);">
      <span class="flex items-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {{ v.views }}
      </span>
      <span>{{ v.created_at.strftime('%Y-%m-%d') if v.created_at else '' }}</span>
    </div>
  </div>
</article>
