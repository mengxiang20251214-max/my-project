{% extends "base.html" %}
{% block title %}注册{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700 p-8">
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center mx-auto mb-4 shadow-lg">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
        </div>
        <h1 class="text-2xl font-bold">创建账号</h1>
        <p class="text-gray-400 text-sm mt-1">加入 {{ site_name }} 社区</p>
      </div>

      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-xl bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 text-sm flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/register" class="space-y-4" x-data="{pw:'',pw2:'',match:true}" @submit="match=(pw===pw2)">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">用户名 <span class="text-gray-400 font-normal text-xs">（3~20 字符）</span></label>
          <input name="username" type="text" required minlength="3" maxlength="20" autocomplete="username"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all"
            placeholder="设置用户名">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">邮箱</label>
          <input name="email" type="email" required autocomplete="email"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all"
            placeholder="输入邮箱地址">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">密码 <span class="text-gray-400 font-normal text-xs">（至少 6 位）</span></label>
          <input name="password" type="password" required minlength="6" x-model="pw" autocomplete="new-password"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all"
            placeholder="设置密码">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">确认密码</label>
          <input name="password2" type="password" required x-model="pw2" autocomplete="new-password"
            :class="pw2 && pw !== pw2 ? 'border-red-400 focus:ring-red-400' : 'border-gray-200 dark:border-gray-700 focus:ring-blue-400'"
            class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-700 text-sm border focus:outline-none focus:ring-2 transition-all"
            placeholder="再次输入密码">
          <p x-show="pw2 && pw !== pw2" class="mt-1 text-xs text-red-500">两次密码不一致</p>
        </div>
        <button type="submit" :disabled="pw2 && pw !== pw2"
          class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold hover:opacity-90 transition-opacity shadow-lg shadow-blue-500/20 disabled:opacity-50 disabled:cursor-not-allowed">
          立即注册
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-500">已有账号？<a href="/login" class="text-blue-600 dark:text-purple-400 font-medium hover:underline">立即登录</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
