{% extends "base.html" %}
{% block title %}{{ t.login }}{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-8">
  <div class="w-full max-w-sm">
    <div class="rounded-3xl border p-8 shadow-xl" style="background:var(--color-card); border-color:var(--color-border);">
      <!-- Logo -->
      <div class="text-center mb-7">
        <div class="w-14 h-14 rounded-2xl bg-grad-primary flex items-center justify-center mx-auto mb-4 shadow-lg">
          <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zm12.553 1.106A1 1 0 0014 8v4a1 1 0 00.553.894l2 1A1 1 0 0018 13V7a1 1 0 00-1.447-.894l-2 1z"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold" style="color:var(--color-text);">{{ t.welcome }}</h1>
        <p class="text-sm mt-1" style="color:var(--color-muted);">{{ t.login_subtitle }}</p>
      </div>

      <!-- 错误提示 -->
      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-xl border text-sm flex items-center gap-2"
           style="background:rgba(239,68,68,0.08); border-color:rgba(239,68,68,0.3); color:#ef4444;">
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <input type="hidden" name="next" value="{{ next }}">
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:var(--color-text);">{{ t.username }}</label>
          <input name="username" type="text" required autocomplete="username"
            class="w-full px-4 py-2.5 rounded-xl border text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/30 transition-all"
            style="background:var(--color-input); border-color:var(--color-border); color:var(--color-text);">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:var(--color-text);">{{ t.password }}</label>
          <div class="relative" x-data="{show:false}">
            <input name="password" :type="show?'text':'password'" required autocomplete="current-password"
              class="w-full px-4 py-2.5 rounded-xl border text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/30 transition-all pr-11"
              style="background:var(--color-input); border-color:var(--color-border); color:var(--color-text);">
            <button type="button" @click="show=!show"
              class="absolute right-3 top-2.5 opacity-40 hover:opacity-70 transition-opacity">
              <svg x-show="!show" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg x-show="show"  class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="w-full py-2.5 rounded-xl text-white font-semibold bg-grad-primary hover:opacity-90 transition-opacity shadow-md mt-2">
          {{ t.login_btn }}
        </button>
      </form>

      <div class="mt-5 p-3 rounded-xl text-xs" style="background:var(--color-input);">
        <p class="font-medium text-primary-500 mb-1">默认账号</p>
        <p style="color:var(--color-muted);">admin / admin123</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
